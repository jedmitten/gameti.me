services:
  ourtime:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"          # change left side to remap host port if needed
    volumes:
      - ./data:/app/data     # SQLite DB persists here on the Synology host
    environment:
      # Generate SECRET_KEY with: python3 -c "import secrets; print(secrets.token_hex(32))"
      SECRET_KEY: ${SECRET_KEY}
      SITE_ADMIN_SECRET: ${SITE_ADMIN_SECRET}
      DB_PATH: data/ourtime.db
      BASE_URL: ${BASE_URL:-http://localhost:8000}
      EVENT_EXPIRY_DAYS: ${EVENT_EXPIRY_DAYS:-90}
      # SMTP — leave empty to disable (recovery tokens log to container stdout)
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@localhost}
      SMTP_TLS: ${SMTP_TLS:-true}
    healthcheck:
      test: ["CMD", "python3", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
